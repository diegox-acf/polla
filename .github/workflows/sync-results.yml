name: Sync match results

# Vercel Hobby limita los cron a 1 vez/día, así que el sync en vivo lo dispara
# este workflow: pega a /api/cron/sync cada 10 min. GitHub puede retrasar la
# ejecución en horas pico, pero alcanza para refrescar resultados durante partidos.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # permite dispararlo a mano desde la pestaña Actions

# Si una corrida tarda, evita que se solapen.
concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -sS --max-time 60 -o /dev/stderr -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/sync")
          echo ""
          echo "HTTP ${code}"
          test "${code}" = "200"
