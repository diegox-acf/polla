name: Sync match results

# El disparo programado del sync lo hace cron-job.org (mejor precisión que el
# cron de GitHub). Aquí queda solo el botón manual como respaldo. El cron diario
# de Vercel sigue como red de seguridad.
on:
  workflow_dispatch: {} # disparo manual de respaldo: Actions → Run workflow

# Si una corrida tarda, evita que se solapen.
concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -sS --max-time 60 -o /dev/stderr -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/sync")
          echo ""
          echo "HTTP ${code}"
          test "${code}" = "200"
